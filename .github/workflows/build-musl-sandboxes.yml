name: Build Musl Sandboxes

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'themackabu/ant ref (branch, tag, or sha)'
        required: false
        default: 'main'
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: build-musl-sandboxes-${{ inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: depot-ubuntu-24.04
    outputs:
      timestamp: ${{ steps.timestamp.outputs.value }}
    steps:
      - id: timestamp
        run: echo "value=$(date +%s)" >> "$GITHUB_OUTPUT"

  build-musl:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-musl-x64
            runner: depot-ubuntu-24.04
            container: alpine:3.23
            family: linux-musl
            shell: sh
          - platform: linux-musl-aarch64
            runner: depot-ubuntu-24.04-arm
            container: alpine:3.23
            family: linux-musl
            shell: sh
    uses: ./.github/workflows/build-platform.yml
    with:
      ref: ${{ inputs.ref }}
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      container: ${{ matrix.container }}
      family: ${{ matrix.family }}
      shell: ${{ matrix.shell }}
      build_timestamp: ${{ needs.prepare.outputs.timestamp }}

  sandbox-x64:
    needs: build-musl
    if: ${{ !cancelled() && needs.build-musl.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      ref: ${{ inputs.ref }}
      arch: x64
      artifact: ant-linux-x64-musl
      runner: depot-ubuntu-24.04
      image: ant-sandbox-x64
      source_run_id: ${{ github.run_id }}

  sandbox-aarch64:
    needs: build-musl
    if: ${{ !cancelled() && needs.build-musl.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      ref: ${{ inputs.ref }}
      arch: aarch64
      artifact: ant-linux-aarch64-musl
      runner: depot-ubuntu-24.04-arm
      image: ant-sandbox-aarch64
      source_run_id: ${{ github.run_id }}

  summary:
    runs-on: depot-ubuntu-24.04
    needs: [build-musl, sandbox-x64, sandbox-aarch64]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Musl sandbox artifacts

          This workflow uploads:

          - `ant-linux-x64-musl`
          - `ant-linux-aarch64-musl`
          - `ant-sandbox-x64`
          - `ant-sandbox-aarch64`

          Each sandbox artifact contains the paired `ant-sandbox-<arch>.img`
          and `ant-kernel-<arch>.img` files.
          SUMMARY
