name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'themackabu/ant ref (branch, tag, or sha)'
        required: false
        default: 'master'
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: build-${{ inputs.ref || 'master' }}
  cancel-in-progress: false

env:
  UPSTREAM_REF: ${{ inputs.ref || 'master' }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.timestamp.outputs.value }}
      ref: ${{ env.UPSTREAM_REF }}
    steps:
      - id: timestamp
        run: |
          echo "value=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "Building themackabu/ant@${UPSTREAM_REF}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-glibc-x64
            runner: blacksmith-8vcpu-ubuntu-2404
            container: ubuntu:22.04
            family: linux-glibc
            shell: bash
          - platform: linux-glibc-aarch64
            runner: blacksmith-8vcpu-ubuntu-2404-arm
            container: ubuntu:22.04
            family: linux-glibc
            shell: bash
          - platform: linux-musl-x64
            runner: blacksmith-8vcpu-ubuntu-2404
            container: alpine:3.23
            family: linux-musl
            shell: sh
          - platform: linux-musl-aarch64
            runner: blacksmith-8vcpu-ubuntu-2404-arm
            container: alpine:3.23
            family: linux-musl
            shell: sh
          - platform: macos-x64
            runner: blacksmith-12vcpu-macos-15
            container: ''
            family: macos
            shell: bash
          - platform: macos-aarch64
            runner: blacksmith-12vcpu-macos-15
            container: ''
            family: macos
            shell: bash
          - platform: windows-x64
            runner: blacksmith-8vcpu-windows-2025
            container: ''
            family: windows
            shell: 'msys2 {0}'
    uses: ./.github/workflows/build-platform.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      container: ${{ matrix.container }}
      family: ${{ matrix.family }}
      shell: ${{ matrix.shell }}
      build_timestamp: ${{ needs.prepare.outputs.timestamp }}

  nanos-x64:
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      arch: x64
      artifact: ant-linux-x64-musl
      runner: blacksmith-8vcpu-ubuntu-2404
      image: ant-sandbox-x64

  nanos-aarch64:
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      arch: aarch64
      artifact: ant-linux-aarch64-musl
      runner: blacksmith-8vcpu-ubuntu-2404-arm
      image: ant-sandbox-aarch64

  summary:
    name: Version
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.build.result != 'skipped' }}
    steps:
      - name: Download version artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: version-*
          path: versions

      - name: Generate summary
        run: |
          VERSIONS=()
          for dir in versions/version-*; do
            v=$(cat "$dir/version.txt" 2>/dev/null || echo "N/A")
            VERSIONS+=("$v")
          done

          UNIQUE=($(printf '%s\n' "${VERSIONS[@]}" | sort -u))

          if [[ ${#UNIQUE[@]} -ne 1 ]]; then
            echo "::error::Version mismatch across platforms: ${UNIQUE[*]}"
            echo "## ❌ Version Mismatch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Expected all platforms to have the same version, but found: ${UNIQUE[*]}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "## Build Version: \`${UNIQUE[0]}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Upstream: \`themackabu/ant@${{ needs.prepare.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY

  refresh-manifest:
    name: Refresh manifest
    needs: [prepare, build, nanos-x64, nanos-aarch64]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && (needs.build.result == 'success' || needs.nanos-x64.result == 'success' || needs.nanos-aarch64.result == 'success') }}
    steps:
      - name: Refresh manifest
        env:
          MANIFEST_REFRESH_TOKEN: ${{ secrets.MANIFEST_REFRESH_TOKEN }}
          UPSTREAM_BRANCH: ${{ needs.prepare.outputs.ref }}
        if: ${{ env.MANIFEST_REFRESH_TOKEN != '' }}
        run: |
          curl -fsS -X POST -G https://manifest.antjs.org/v1/refresh \
            --data-urlencode "branch=${UPSTREAM_BRANCH}" \
            --data-urlencode "run_id=${GITHUB_RUN_ID}" \
            -H "Authorization: Bearer ${MANIFEST_REFRESH_TOKEN}"
